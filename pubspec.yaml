name: steam_notifications
description: Steam-inspired desktop notifications for Flutter using multi-window APIs
version: 0.1.0
repository: https://github.com/example/steam_notifications

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.2.0
  uuid: ^4.5.1
  win32: ^6.0.0
  window_decoration:
    git:
      url: https://github.com/rkishan516/window_decoration.git
      path: packages/window_decoration

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
